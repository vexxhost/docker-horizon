name: build

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - stable/**

permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@2b0040e59869e408a94f1e92e67fa47035c50336 # main
        with:
          repository: openstack/horizon
          ref: c5b41bc01bfc7c336d1a7cbeecdb1ded45538400 # stable/2026.1

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@2b0040e59869e408a94f1e92e67fa47035c50336 # main
        with:
          repository: openstack/designate-dashboard
          ref: 5610dab9e2077d03967937499b34b61ef3462012 # stable/2026.1

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@2b0040e59869e408a94f1e92e67fa47035c50336 # main
        with:
          repository: openstack/heat-dashboard
          ref: e66b5fe0e46f64528eca73b90d15bdc2e9b82d1e # stable/2026.1

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@2b0040e59869e408a94f1e92e67fa47035c50336 # main
        with:
          repository: openstack/ironic-ui
          ref: 16e768e11f580e4a993a294e4a27eb1d8ed1a0bd # stable/2026.1

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@2b0040e59869e408a94f1e92e67fa47035c50336 # main
        with:
          repository: openstack/magnum-ui
          ref: a8c005422adbed37146ddf8b978e5ff61a2b4eb1 # stable/2026.1

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@2b0040e59869e408a94f1e92e67fa47035c50336 # main
        with:
          repository: openstack/manila-ui
          ref: 19e19268f90fcb3bd56c1b0bfd9cab7c05298c1c # stable/2026.1

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@2b0040e59869e408a94f1e92e67fa47035c50336 # main
        with:
          repository: openstack/neutron-fwaas-dashboard
          ref: 5dbef28cb1ee89c722b1aed5aefd5c125305ced6 # stable/2026.1

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@2b0040e59869e408a94f1e92e67fa47035c50336 # main
        with:
          repository: openstack/neutron-vpnaas-dashboard
          ref: 1f57481b5d036813c552d6fb36f1b4ebe700f840 # stable/2026.1

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@2b0040e59869e408a94f1e92e67fa47035c50336 # main
        with:
          repository: openstack/octavia-dashboard
          ref: 0b50985cb12ee1c8917e51f38d0119b57fee1104 # stable/2026.1

      - uses: vexxhost/docker-atmosphere/.github/actions/build-image@2b0040e59869e408a94f1e92e67fa47035c50336 # main
        with:
          image-name: horizon
          build-contexts: |
            horizon=openstack/horizon
            designate-dashboard=openstack/designate-dashboard
            heat-dashboard=openstack/heat-dashboard
            ironic-ui=openstack/ironic-ui
            magnum-ui=openstack/magnum-ui
            manila-ui=openstack/manila-ui
            neutron-fwaas-dashboard=openstack/neutron-fwaas-dashboard
            neutron-vpnaas-dashboard=openstack/neutron-vpnaas-dashboard
            octavia-dashboard=openstack/octavia-dashboard
          push: ${{ github.event_name != 'pull_request' }}
